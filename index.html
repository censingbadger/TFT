/* ══════════════════════════════════════════════════════════════
   ONBOARDING — Name → North Star → Assessment offer
   ══════════════════════════════════════════════════════════════ */

function PIVOTOnboarding(props) {
  var program = props.program;            /* "ubp" | "mba" */
  var onComplete = props.onComplete || function(){};
  var paths = program === "ubp" ? UBP_PATHS : PATHS;
  var CB = program === "ubp" ? "#4B9CD3" : "#7BAFD4";

  var _step = useState(0); var step = _step[0], setStep = _step[1];
  var _name = useState(""); var name = _name[0], setName = _name[1];
  var _ns = useState(null); var ns = _ns[0], setNs = _ns[1];
  var _showA = useState(false); var showAssessment = _showA[0], setShowAssessment = _showA[1];
  var _form = useState("short"); var assessmentForm = _form[0], setAssessmentForm = _form[1];
  var _fade = useState(false); var fade = _fade[0], setFade = _fade[1];

  useEffect(function(){
    /* Pre-populate name field if user previously typed one */
    try { var v = localStorage.getItem(program+"_user_name"); if (v && v.trim()) setName(v.trim()); } catch(e){}
    setTimeout(function(){ setFade(true); }, 60);
  }, []);

  function persistAndFinish(saveAssessmentPayload) {
    try {
      if (name && name.trim()) localStorage.setItem(program+"_user_name", name.trim());
      if (ns) localStorage.setItem(program+"_northstar", ns);
      if (saveAssessmentPayload) localStorage.setItem(program+"_pivot_assessment", JSON.stringify(saveAssessmentPayload));
      localStorage.setItem(program+"_onboarded", "1");
    } catch(e){}
    setFade(false);
    setTimeout(function(){ onComplete(); }, 300);
  }

  function nextFromName(){ setStep(1); }
  function nextFromNorthStar(){ setStep(2); }
  function startForm(form){ setAssessmentForm(form); setShowAssessment(true); }
  function onAssessmentSave(payload){ setShowAssessment(false); persistAndFinish(payload); }
  function onAssessmentClose(){ setShowAssessment(false); persistAndFinish(null); /* skip ahead */ }

  var totalSteps = 3;
  var canContinueName = name && name.trim().length > 0;

  return (
    <div style={{
      width:"100%", maxWidth:430, margin:"0 auto",
      height:"calc(var(--vh, 1vh) * 100)", minHeight:700,
      background:"linear-gradient(170deg,#0a1628 0%,#060d1a 40%,#040810 100%)",
      display:"flex", flexDirection:"column", overflow:"hidden",
      fontFamily:FONT, position:"relative",
      opacity: fade ? 1 : 0, transition:"opacity 0.5s ease",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>

      {/* Progress dots */}
      <div style={{padding:"22px 24px 0", display:"flex", justifyContent:"center", gap:6}}>
        {[0,1,2].map(function(i){
          var on = i <= step;
          return <div key={"d"+i} style={{
            width: on ? 22 : 6, height:6, borderRadius:3,
            background: on ? CB : "rgba(255,255,255,0.18)",
            transition:"all 0.3s ease",
          }}/>;
        })}
      </div>

      <div style={{flex:1, overflowY:"auto", padding:"40px 28px 24px", display:"flex", flexDirection:"column", justifyContent:"center"}}>

        {/* STEP 1 — Name */}
        {step === 0 && (
          <div style={{display:"flex", flexDirection:"column", alignItems:"center"}}>
            <div style={{fontSize:11, fontWeight:700, color:rgba(CB,0.6), letterSpacing:2.5, textTransform:"uppercase", marginBottom:18}}>Welcome to PIVOT</div>
            <div style={{fontSize:26, fontWeight:800, color:"#fff", marginBottom:12, textAlign:"center", letterSpacing:0.3}}>What should we call you?</div>
            <div style={{fontSize:14, color:"rgba(255,255,255,0.6)", textAlign:"center", lineHeight:1.55, marginBottom:30, maxWidth:320}}>
              Your name helps us personalize your journey. This stays on your device.
            </div>
            <input
              type="text"
              value={name}
              onChange={function(e){setName(e.target.value);}}
              placeholder="Your full name"
              maxLength={60}
              autoFocus
              style={{
                width:"100%", maxWidth:320, padding:"14px 16px",
                borderRadius:12, background:"rgba(255,255,255,0.05)",
                border:"1px solid "+rgba(CB,0.3),
                color:"#fff", fontSize:16, fontWeight:600,
                fontFamily:FONT, outline:"none", textAlign:"center",
                marginBottom:24,
              }}
            />
            <button onClick={canContinueName ? nextFromName : null} disabled={!canContinueName} style={{
              width:"100%", maxWidth:320, padding:"14px 0",
              borderRadius:12,
              background: canContinueName ? rgba(CB, 0.22) : "rgba(255,255,255,0.04)",
              border:"1px solid "+(canContinueName ? rgba(CB,0.6) : "rgba(255,255,255,0.1)"),
              color: canContinueName ? "#fff" : "rgba(255,255,255,0.3)",
              fontSize:15, fontWeight:700, fontFamily:FONT,
              cursor: canContinueName ? "pointer" : "not-allowed",
              letterSpacing:0.3,
            }}>Continue →</button>
            <div onClick={function(){ setName(""); setStep(1); }} style={{marginTop:18, fontSize:13, color:"rgba(255,255,255,0.45)", cursor:"pointer", padding:"8px 14px"}}>Skip</div>
          </div>
        )}

        {/* STEP 2 — North Star */}
        {step === 1 && (
          <div>
            <div style={{fontSize:11, fontWeight:700, color:rgba(CB,0.6), letterSpacing:2.5, textTransform:"uppercase", marginBottom:14, textAlign:"center"}}>Pick Your North Star</div>
            <div style={{fontSize:22, fontWeight:800, color:"#fff", marginBottom:10, textAlign:"center", lineHeight:1.3}}>What are you aiming at?</div>
            <div style={{fontSize:13, color:"rgba(255,255,255,0.6)", textAlign:"center", lineHeight:1.55, marginBottom:24, padding:"0 8px"}}>
              This becomes the goal your skills point toward. You can change it anytime in Readiness.
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20}}>
              {paths.map(function(p){
                var on = ns === p.id;
                return <button key={p.id} onClick={function(){ setNs(p.id); }} style={{
                  padding:"14px 10px", borderRadius:12,
                  background: on ? rgba(p.color, 0.28) : rgba(p.color, 0.10),
                  border: "1.5px solid "+(on ? p.color : rgba(p.color, 0.4)),
                  color: p.color, fontWeight:700, fontSize:14,
                  cursor:"pointer", fontFamily:FONT, lineHeight:1.25,
                  transition:"all 0.18s ease",
                }}>
                  {p.label}
                  <div style={{fontSize:10, fontWeight:500, color: rgba(p.color, 0.75), marginTop:3}}>{p.goalLabel}</div>
                </button>;
              })}
            </div>
            <button onClick={ns ? nextFromNorthStar : null} disabled={!ns} style={{
              width:"100%", padding:"14px 0", borderRadius:12,
              background: ns ? rgba(CB, 0.22) : "rgba(255,255,255,0.04)",
              border:"1px solid "+(ns ? rgba(CB,0.6) : "rgba(255,255,255,0.1)"),
              color: ns ? "#fff" : "rgba(255,255,255,0.3)",
              fontSize:15, fontWeight:700, fontFamily:FONT,
              cursor: ns ? "pointer" : "not-allowed", letterSpacing:0.3,
            }}>Continue →</button>
            <div style={{display:"flex", justifyContent:"center", gap:18, marginTop:14}}>
              <div onClick={function(){setStep(0);}} style={{fontSize:13, color:"rgba(255,255,255,0.45)", cursor:"pointer", padding:"6px 10px"}}>← Back</div>
              <div onClick={function(){ setNs(null); setStep(2); }} style={{fontSize:13, color:"rgba(255,255,255,0.45)", cursor:"pointer", padding:"6px 10px"}}>Skip</div>
            </div>
          </div>
        )}

        {/* STEP 3 — Assessment offer */}
        {step === 2 && (
          <div>
            <div style={{fontSize:11, fontWeight:700, color:rgba(CB,0.6), letterSpacing:2.5, textTransform:"uppercase", marginBottom:14, textAlign:"center"}}>PIVOT Self-Assessment</div>
            <div style={{fontSize:22, fontWeight:800, color:"#fff", marginBottom:10, textAlign:"center", lineHeight:1.3}}>Set your baseline</div>
            <div style={{fontSize:13, color:"rgba(255,255,255,0.65)", textAlign:"center", lineHeight:1.6, marginBottom:8, padding:"0 4px"}}>
              Rate yourself across the 5 PIVOT dimensions. This becomes the foundation of your radar.
            </div>
            <div style={{fontSize:12, color:"rgba(255,204,68,0.85)", textAlign:"center", lineHeight:1.55, marginBottom:22, padding:"0 8px", fontStyle:"italic"}}>
              Be brutally honest. Your radar is only as useful as the data you give it.
            </div>

            <button onClick={function(){startForm("short");}} style={{
              width:"100%", padding:"16px 18px", borderRadius:14,
              background: rgba(CB, 0.14),
              border:"1.5px solid "+rgba(CB,0.5),
              cursor:"pointer", fontFamily:FONT,
              marginBottom:10, textAlign:"left",
            }}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4}}>
                <span style={{fontSize:15, fontWeight:800, color:"#fff"}}>Short Form</span>
                <span style={{fontSize:11, fontWeight:700, color:rgba(CB,0.85), letterSpacing:1}}>~1 MIN · 15 ITEMS</span>
              </div>
              <div style={{fontSize:12, color:"rgba(255,255,255,0.6)", lineHeight:1.5}}>One signal per facet. A fast directional read.</div>
            </button>

            <button onClick={function(){startForm("long");}} style={{
              width:"100%", padding:"16px 18px", borderRadius:14,
              background: rgba(CB, 0.06),
              border:"1px solid "+rgba(CB,0.3),
              cursor:"pointer", fontFamily:FONT,
              marginBottom:18, textAlign:"left",
            }}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4}}>
                <span style={{fontSize:15, fontWeight:800, color:"#fff"}}>Long Form</span>
                <span style={{fontSize:11, fontWeight:700, color:rgba(CB,0.7), letterSpacing:1}}>~5 MIN · 60 ITEMS</span>
              </div>
              <div style={{fontSize:12, color:"rgba(255,255,255,0.6)", lineHeight:1.5}}>Full coverage across all 30 facets. Highest fidelity.</div>
            </button>

            <div onClick={function(){ persistAndFinish(null); }} style={{
              textAlign:"center", padding:"12px 14px",
              fontSize:13, color:"rgba(255,255,255,0.5)", cursor:"pointer",
            }}>Skip for now — I'll take it later</div>

            <div style={{display:"flex", justifyContent:"center", marginTop:6}}>
              <div onClick={function(){setStep(1);}} style={{fontSize:13, color:"rgba(255,255,255,0.4)", cursor:"pointer", padding:"6px 10px"}}>← Back</div>
            </div>
          </div>
        )}
      </div>

      {/* Assessment modal — close = skip ahead */}
      <PIVOTAssessment
        open={showAssessment}
        form={assessmentForm}
        initial={{}}
        onSave={onAssessmentSave}
        onClose={onAssessmentClose}
      />
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP — Launch + Program Router
   ══════════════════════════════════════════════════════════════ */

function PIVOTApp() {
  var _prog = useState(null);
  var program = _prog[0], setProgram = _prog[1];
  var _screen = useState("journey");
  var screen = _screen[0], setScreen = _screen[1];
  var _fadeIn = useState(false);
  var fadeIn = _fadeIn[0], setFadeIn = _fadeIn[1];
  var _onb = useState(false); var needsOnboarding = _onb[0], setNeedsOnboarding = _onb[1];

  function handleProgramSelect(prog) {
    setProgram(prog);
    setScreen(prog === "mba" ? "progress" : "index");
    var done = false;
    try { done = !!localStorage.getItem(prog + "_onboarded"); } catch(e){}
    setNeedsOnboarding(!done);
    setTimeout(function () { setFadeIn(true); }, 50);
  }

  function finishOnboarding() { setNeedsOnboarding(false); }

  if (!program) {
    return (
      <div>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
        <PIVOTLaunch onSelect={handleProgramSelect} />
      </div>
    );
  }

  if (needsOnboarding) {
    return <PIVOTOnboarding program={program} onComplete={finishOnboarding} />;
  }

  function handleSwitch(s) { setScreen(s); }

  var screenComponent = null;
  if (program === "ubp") {
    if (screen === "journey") screenComponent = <UBPJourney onSwitch={handleSwitch} />;
    else if (screen === "index") screenComponent = <UBPIndex onSwitch={handleSwitch} />;
    else if (screen === "team") screenComponent = <UBPTeam onSwitch={handleSwitch} />;
    else if (screen === "network") screenComponent = <UBPNetwork onSwitch={handleSwitch} />;
    else if (screen === "assistant") screenComponent = <UBPAssistant onSwitch={handleSwitch} />;
    /* Legacy: dashboard now folds into Progress (Index) for parity with MBA */
    else if (screen === "dashboard") screenComponent = <UBPIndex onSwitch={handleSwitch} />;
  } else if (program === "mba") {
    if (screen === "journey") screenComponent = <MBAJourney onSwitch={handleSwitch} />;
    else if (screen === "progress") screenComponent = <MBAProgress onSwitch={handleSwitch} />;
    else if (screen === "team") screenComponent = <MBATeam onSwitch={handleSwitch} />;
    else if (screen === "network") screenComponent = <MBANetwork onSwitch={handleSwitch} />;
    else if (screen === "coach") screenComponent = <MBAAssistant onSwitch={handleSwitch} />;
    /* Legacy key routes (in case deep links or persisted state still use old names) */
    else if (screen === "dashboard" || screen === "index") screenComponent = <MBAProgress onSwitch={handleSwitch} />;
    else if (screen === "assistant") screenComponent = <MBAAssistant onSwitch={handleSwitch} />;
  }

  return (
    <div style={{
      opacity: fadeIn ? 1 : 0, transition: "opacity 0.4s ease",
    }}>
      {screenComponent}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(PIVOTApp));
  </script>
