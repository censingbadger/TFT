function rgba(hex, a) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + a + ")";
}

/* ── Shared Bottom Nav ── */
function BottomNav(props) {
  var active = props.active;
  var setActive = props.setActive;
  var color = props.color || "#7BAFD4";
  var onSwitch = props.onSwitch;
  var items = [
    { k: "journey", l: "Journey", i: "✦" },
    { k: "dashboard", l: "Dashboard", i: "◧" },
    { k: "index", l: "PIVOT Index", i: "◉" },
    { k: "network", l: "Network", i: "◈" },
    { k: "assistant", l: "Assistant", i: "✧" },
  ];
  return (
    <div style={{ display: "flex", justifyContent: "space-around", padding: "10px 0 28px", background: rgba(CN, 0.95), borderTop: "1px solid " + rgba(color, 0.08) }}>
      {items.map(function (item) {
        var isActive = active === item.k;
        return (
          <button key={item.k} onClick={function () { setActive(item.k); if (onSwitch) onSwitch(item.k); }} style={{
            background: "none", border: "none", cursor: "pointer", padding: "2px 0",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          }}>
            <span style={{ fontSize: 20, color: isActive ? color : "rgba(255,255,255,0.25)", transition: "color 0.2s" }}>{item.i}</span>
            <span style={{ fontSize: 11, letterSpacing: 0.3, fontFamily: FONT, color: isActive ? color : "rgba(255,255,255,0.25)", fontWeight: isActive ? 600 : 400 }}>{item.l}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ── Starfield (deterministic) ── */
function LAUNCH_genStars(n, seed) {
  var s = [];
  for (var i = 0; i < n; i++) {
    seed = (seed * 9301 + 49297) % 233280;
    var x = (seed / 233280) * 100;
    seed = (seed * 9301 + 49297) % 233280;
    var y = (seed / 233280) * 100;
    seed = (seed * 9301 + 49297) % 233280;
    var op = 0.1 + (seed / 233280) * 0.5;
    seed = (seed * 9301 + 49297) % 233280;
    var sz = 0.5 + (seed / 233280) * 1.8;
    s.push({ x: x, y: y, op: op, sz: sz });
  }
  return s;
}
var LAUNCH_STARS = LAUNCH_genStars(80, 42);

function PIVOTLaunch(props) {
  var CB = "#7BAFD4";
  var onSelect = props.onSelect || function () {};
  var _phase = useState(0);
  var phase = _phase[0], setPhase = _phase[1];
  var _hover = useState(null);
  var hover = _hover[0], setHover = _hover[1];
  var _selected = useState(null);
  var selected = _selected[0], setSelected = _selected[1];

  useEffect(function () {
    /* Cinematic sequence: logo → wordmark → tagline → cards */
    var t1 = setTimeout(function () { setPhase(1); }, 400);   /* logo */
    var t2 = setTimeout(function () { setPhase(2); }, 1200);  /* PIVOT wordmark */
    var t3 = setTimeout(function () { setPhase(3); }, 2000);  /* tagline */
    var t4 = setTimeout(function () { setPhase(4); }, 2600);  /* program cards */
    return function () { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
  }, []);

  function handleSelect(prog) {
    if (!prog.active) return;
    setSelected(prog.id);
    setTimeout(function () {
      onSelect(prog.id);
    }, 800);
  }

  var fadeOut = selected !== null;

  return (

              else { lO = 0.05; lW = 1; lC = CB; lD = "4,6"; }
              return <line key={"c" + ci} x1={a.x / 100 * UBP_CW} y1={a.y / 100 * UBP_CH} x2={b.x / 100 * UBP_CW} y2={b.y / 100 * UBP_CH} stroke={rgba(lC, lO)} strokeWidth={lW} strokeDasharray={lD} strokeLinecap="round" style={{ transition: "all 0.5s ease" }} />;
            })}
            {UBP_NODES.map(function (n) {

                  {n.done && <g><circle cx={nx + sz - 2} cy={ny - sz + 2} r={6} fill="#50C878" stroke="#080816" strokeWidth={2} /><text x={nx + sz - 2} y={ny - sz + 3} textAnchor="middle" dominantBaseline="middle" fontSize={8} fill="#fff" fontWeight={700} style={{ pointerEvents: "none" }}>✓</text></g>}
                </g>
              );

            <rect x={0} y={0} width={UBP_CW} height={UBP_CH} fill="url(#fr)" style={{ pointerEvents: "none" }} />

            {/* ── Timeline Path Labels ── */}
            {[
              { label: "Freshman Year", sub: "Fall 2025", x: 8 },

              return (

                  <line x1={tx} y1={UBP_CH - 38} x2={tx} y2={UBP_CH - 28} stroke={col} strokeWidth={isH ? 2 : 1} />

                  <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: 20, background: rgba(PC[selNode.pivot], 0.1), border: "1px solid " + rgba(PC[selNode.pivot], 0.2), fontSize: 13, fontWeight: 600, color: PC[selNode.pivot] }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: PC[selNode.pivot] }} />{selNode.grew}
                  </div>
                </div>
              </div>
            ) : (
              <div style={{ padding: "14px 16px", borderRadius: 12, background: rgba(PC[selNode.pivot], 0.04), border: "1px solid " + rgba(PC[selNode.pivot], 0.1) }}>
                <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", lineHeight: 1.5 }}>This experience is upcoming. Completing it will earn you a <span style={{ color: PC[selNode.pivot], fontWeight: 600 }}>{DIM_NAMES[selNode.pivot]}</span> token and grow your <span style={{ color: PC[selNode.pivot], fontWeight: 600 }}>{selNode.grew}</span> competency.</div>
              </div>
            )}
          </div>
        ) : (
          <div style={{ textAlign: "center", padding: "14px 0" }}>
            <div style={{ fontSize: 14, color: dimFilter ? rgba(PC[dimFilter], 0.5) : "rgba(255,255,255,0.2)" }}>{dimFilter ? DIM_NAMES[dimFilter] + " pathway illuminated · Tap a node" : "Scroll right to see your future · Tap any node to explore"}</div>
          </div>
        )}
      </div>
      <BottomNav active={activeNav} setActive={setActiveNav} color={CB} onSwitch={props.onSwitch} />
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "4px 0 6px", background: rgba(CN, 0.9) }}>
        <img src={UNC_LOGO} alt="UNC" style={{ width: 14, height: 14, objectFit: "contain" }} />
        <span style={{ fontSize: 9, color: rgba(CB, 0.5), letterSpacing: 1.5, textTransform: "uppercase" }}>UNC Kenan-Flagler Undergraduate Business</span>
      </div>
    </div>
  );
}

              <polygon points={poly(UBP_SCORES)} fill={rgba(CB, 0.1)} stroke={CB} strokeWidth={2} />
              {/* Score dots */}
              {DIMS.map(function (d, i) {
                var p = pt(i, (UBP_SCORES[d] / 5) * R);
                return <circle key={d} cx={p[0]} cy={p[1]} r={4} fill={PC[d]} stroke="#fff" strokeWidth={1.5} />;

              {/* Labels */}
              {DIMS.map(function (d, i) {
                var labelR = R + 20;
                var p = pt(i, labelR);
                return (
                  <text key={d} x={p[0]} y={p[1]}

            </div>
          </div>
        </div>

      </div>

          UNC Kenan-Flagler Undergraduate Business

          return (
            <div key={i} style={{
              background: rgba(CB, 0.06),
              border: "1px solid " + rgba(CB, 0.12),
              borderRadius: 12, padding: "14px 16px", marginBottom: 12,

          <svg width={MBA_CW} height={MBA_CH} style={{display:"block",opacity:anim?1:0,transition:"opacity 1s ease",minWidth:MBA_CW}}>
            <defs>
              <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

                  {!dimmed&&(isSel||inP||n.done||isFloat)&&(

        <style>{"\n@keyframes pulse{0%,100%{opacity:0.6;transform:translateY(-50%) translateX(0)}50%{opacity:1;transform:translateY(-50%) translateX(5px)}}\n"}</style>
      </div>

      {/* Detail panel — inline like UBP */}
      <div style={{minHeight:selN?180:46,maxHeight:selN?260:46,transition:"all 0.3s ease",overflowY:selN?"auto":"hidden",borderTop:"1px solid "+rgba(CB,0.08),background:rgba(CN,0.6)}}>
        {selN?(
          <div style={{padding:"14px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:18}}>{MBA_TI[selN.type]||"⭐"}</span><span style={{fontSize:17,fontWeight:700,color:"#fff"}}>{selN.label}</span></div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>{selN.type.charAt(0).toUpperCase()+selN.type.slice(1)} · <span style={{color:PC[selN.pivot],fontWeight:600}}>{DIM_NAMES[selN.pivot]}</span></div>
              </div>
              <div onClick={function(){setSel(null);}} style={{padding:"4px 10px",borderRadius:8,cursor:"pointer",background:rgba(CB,0.08),fontSize:13,color:"rgba(255,255,255,0.4)"}}>✕</div>
            </div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.6)",lineHeight:1.55}}>{selN.done?"Completed — this experience contributed to your growth in "+DIM_NAMES[selN.pivot]+".":"Upcoming — completing this will develop your "+DIM_NAMES[selN.pivot]+" dimension."}</div>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"14px 0"}}>
            <div style={{fontSize:14,color:ap?rgba(pCol,0.5):(dimFilter?rgba(PC[dimFilter],0.5):"rgba(255,255,255,0.2)")}}>{ap?pw.label+" pathway illuminated \u00B7 Tap a node":(dimFilter?DIM_NAMES[dimFilter]+" experiences highlighted":"Scroll right to see your future \u00B7 Tap any node to explore")}</div>
          </div>
        )}
      </div>

      <BottomNav active={nav} setActive={setNav} color={CB} onSwitch={props.onSwitch}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"4px 0 6px",background:rgba(CN,0.9)}}>
        <img src={UNC_LOGO} alt="UNC" style={{width:14,height:14,objectFit:"contain"}}/>
        <span style={{fontSize:9,color:rgba(CB,0.5),letterSpacing:1.5,textTransform:"uppercase"}}>UNC Kenan-Flagler Business School</span>
      </div>
    </div>
  );
}

function MBA_TokenBar(props) {
  var CB = "#7BAFD4";

  var data = props.data;
  var expanded = props.expanded;
  var onToggle = props.onToggle;
  var earned = data.earned.length;
  var total = data.total;
  var pct = Math.round((earned / total) * 100);

  return (
    <div style={{ marginBottom: 6 }}>
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 12, padding: "14px 16px",
          background: rgba(color, 0.06), borderRadius: expanded ? "14px 14px 0 0" : 14,
          border: "1px solid " + rgba(color, expanded ? 0.25 : 0.1),
          cursor: "pointer", transition: "all 0.2s",

        <div style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "linear-gradient(135deg," + rgba(color, 0.3) + "," + rgba(color, 0.08) + ")",

          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 15, fontWeight: 700, color: color,
        }}>{dim}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
            <span style={{ fontSize: 16, fontWeight: 600, color: "rgba(255,255,255,0.8)" }}>{DIM_NAMES[dim]}</span>

          </div>
          <div style={{ height: 6, background: rgba(color, 0.1), borderRadius: 3 }}>
            <div style={{
              height: "100%", borderRadius: 3, width: pct + "%",
              background: "linear-gradient(90deg," + color + "," + rgba(color, 0.6) + ")",
              transition: "width 1s ease",
            }} />
          </div>
        </div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", transform: expanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>▼</div>

        <div style={{
          background: rgba(color, 0.03), border: "1px solid " + rgba(color, 0.12),

/* ── Message Renderer ── */
function MBA_MessageContent(props) {
  var CB = "#7BAFD4";
  var blocks = props.blocks;
  if (!blocks) return null;

  return (
    <div>
      {blocks.map(function (block, i) {
        if (block.type === "text") {
          return (
            <div key={i} style={{
              fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.7,
              whiteSpace: "pre-wrap", marginBottom: 10,
            }}>
              {block.content}
            </div>
          );
        }
        if (block.type === "pivot-cards") {
          return (
            <div key={i} style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
              {block.cards.map(function (card, ci) {
                return (
                  <div key={ci} style={{
                    background: rgba(PC[card.dim], 0.08),
                    border: "1px solid " + rgba(PC[card.dim], 0.2),
                    borderRadius: 12, padding: "12px 14px",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{
                        width: 28, height: 28, borderRadius: "50%",
                        background: rgba(PC[card.dim], 0.2),
                        border: "2px solid " + rgba(PC[card.dim], 0.5),
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, fontWeight: 700, color: PC[card.dim],
                      }}>{card.dim}</div>
                      <span style={{ fontSize: 14, fontWeight: 600, color: PC[card.dim] }}>{card.label}</span>
                      <span style={{ marginLeft: "auto", fontSize: 18, fontWeight: 700, color: PC[card.dim] }}>{card.score}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.6 }}>{card.note}</div>
                  </div>
                );
              })}
            </div>
          );
        }
        if (block.type === "story") {
          return (
            <div key={i} style={{
              background: rgba(CB, 0.06),
              border: "1px solid " + rgba(CB, 0.12),
              borderRadius: 12, padding: "14px 16px", marginBottom: 12,
            }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: rgba(CB, 0.8), textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>{block.title}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.75)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{block.content}</div>
            </div>
          );
        }
        if (block.type === "insight") {
          var isFor = block.title.indexOf("For") > -1;
          var borderColor = isFor ? rgba("#50C878", 0.25) : rgba("#FF6B6B", 0.25);
          var bgColor = isFor ? rgba("#50C878", 0.04) : rgba("#FF6B6B", 0.04);
          return (
            <div key={i} style={{
              background: bgColor,
              border: "1px solid " + borderColor,
              borderRadius: 12, padding: "12px 14px", marginBottom: 8,
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: isFor ? "#50C878" : "#FF6B6B", marginBottom: 6 }}>{block.title}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>{block.content}</div>
            </div>
          );
        }
        return null;
      })}
    </div>
  );
}

          padding: "14px 18px",
          border: "1px solid " + rgba(CB, 0.08),
        }}>
          <div style={{ flex: 1, fontSize: 15, color: "rgba(255,255,255,0.25)" }}>Ask about your leadership development...</div>
          <button style={{
            width: 38, height: 38, borderRadius: "50%",
            background: CB, border: "none",
            cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 16, color: "#fff", fontWeight: 700,
            flexShrink: 0,
          }}>{"\u2191"}</button>
        </div>

      {/* ── Bottom Nav ── */}
      <BottomNav active={activeNav} setActive={setActiveNav} color={CB} onSwitch={props.onSwitch} />

      <div style={{

  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP — Launch + Program Router
   ══════════════════════════════════════════════════════════════ */

function PIVOTApp() {
  var _prog = useState(null);
  var program = _prog[0], setProgram = _prog[1];
  var _screen = useState("journey");
  var screen = _screen[0], setScreen = _screen[1];
  var _fadeIn = useState(false);
  var fadeIn = _fadeIn[0], setFadeIn = _fadeIn[1];

  function handleProgramSelect(prog) {
    setProgram(prog);
    setScreen("journey");
    setTimeout(function () { setFadeIn(true); }, 50);
  }

  if (!program) {
    return (
      <div>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
        <PIVOTLaunch onSelect={handleProgramSelect} />
      </div>
    );
  }

  function handleSwitch(s) { setScreen(s); }

  var screenComponent = null;
  if (program === "ubp") {
    if (screen === "journey") screenComponent = <UBPJourney onSwitch={handleSwitch} />;
    else if (screen === "dashboard") screenComponent = <UBPDashboard onSwitch={handleSwitch} />;
    else if (screen === "index") screenComponent = <UBPIndex onSwitch={handleSwitch} />;
    else if (screen === "network") screenComponent = <UBPNetwork onSwitch={handleSwitch} />;
    else if (screen === "assistant") screenComponent = <UBPAssistant onSwitch={handleSwitch} />;
  } else if (program === "mba") {
    if (screen === "journey") screenComponent = <MBAJourney onSwitch={handleSwitch} />;
    else if (screen === "dashboard") screenComponent = <MBADashboard onSwitch={handleSwitch} />;
    else if (screen === "index") screenComponent = <MBAIndex onSwitch={handleSwitch} />;
    else if (screen === "network") screenComponent = <MBANetwork onSwitch={handleSwitch} />;
    else if (screen === "assistant") screenComponent = <MBAAssistant onSwitch={handleSwitch} />;
  }

  return (
    <div style={{
      opacity: fadeIn ? 1 : 0, transition: "opacity 0.4s ease",
    }}>
      {screenComponent}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(PIVOTApp));
  </script>
</body>
