function rgba(hex, a) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + a + ")";
}

/* Compute domain scores (1-5) from a responses dict {itemNum: 1..5} */
function scorePIVOT(responses){
  var byDim = {P:[],I:[],V:[],O:[],T:[]};
  PIVOT_ASSESSMENT_ITEMS.forEach(function(it){
    var v = responses[it.num];
    if (typeof v === "number") byDim[it.dim].push(v);
  });
  var scores = {};
  Object.keys(byDim).forEach(function(d){
    var arr = byDim[d];
    scores[d] = arr.length ? Math.round((arr.reduce(function(a,b){return a+b;},0)/arr.length)*10)/10 : null;
  });
  return scores;
}

/* ── Reusable Radar Chart (attributes + skills + optional career target) ── */
/* Accepts either (attrs, earnedMap) OR precomputed dimData={P:{attrPct,skillPct,totalPct},...} */
function PIVOTRadar(props){
  var size = props.size || 240;
  var attrs = props.attrs;
  var earnedMap = props.earnedMap || {};
  var precomputed = props.dimData;
  var target = props.target || null;
  var fillColor = props.color || "#7BAFD4";
  var showLabels = props.showLabels !== false;
  var cx = size/2, cy = size/2;
  var radius = size/2 - 28;

  var attrPts=[], combinedPts=[], targetPts=[], axisEnds=[], labelPos=[];
  var dimData = [];
  DIMS.forEach(function(d, i){
    var ang = -Math.PI/2 + (i * 2*Math.PI/5);
    var r = precomputed ? precomputed[d] : computeReadiness(d, earnedMap, attrs);
    dimData.push(r);
    var ax = cx + Math.cos(ang) * radius * (r.attrPct/100);
    var ay = cy + Math.sin(ang) * radius * (r.attrPct/100);
    var bx = cx + Math.cos(ang) * radius * (r.totalPct/100);
    var by = cy + Math.sin(ang) * radius * (r.totalPct/100);
    attrPts.push(ax+","+ay);
    combinedPts.push(bx+","+by);
    axisEnds.push({x:cx+Math.cos(ang)*radius, y:cy+Math.sin(ang)*radius});
    if (target){
      var tx = cx + Math.cos(ang) * radius * (target[d]/100);
      var ty = cy + Math.sin(ang) * radius * (target[d]/100);
      targetPts.push(tx+","+ty);
    }
    labelPos.push({x:cx+Math.cos(ang)*(radius+16), y:cy+Math.sin(ang)*(radius+16)+3, dim:d, ang:ang});
  });

  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size} style={{display:"block"}}>
      {/* Concentric gridlines at 25/50/75/100 */}
      {[0.25, 0.5, 0.75, 1.0].map(function(f, gi){
        var pts = DIMS.map(function(d, i){ var ang=-Math.PI/2+i*2*Math.PI/5; return (cx+Math.cos(ang)*radius*f)+","+(cy+Math.sin(ang)*radius*f); }).join(" ");
        return <polygon key={"grid"+gi} points={pts} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={f===0.5?1.2:0.6}/>;
      })}
      {/* 50% attribute ceiling highlighted */}
      {/* Axis lines */}
      {DIMS.map(function(d,i){
        return <line key={"ax"+i} x1={cx} y1={cy} x2={axisEnds[i].x} y2={axisEnds[i].y} stroke="rgba(255,255,255,0.09)" strokeWidth={0.8}/>;
      })}
      {/* Target polygon (dashed) */}
      {target && <polygon points={targetPts.join(" ")} fill="rgba(255,255,255,0.04)" stroke="rgba(255,220,130,0.85)" strokeWidth={1.4} strokeDasharray="4,3"/>}
      {/* Combined polygon (attributes + skills) */}
      <polygon points={combinedPts.join(" ")} fill={rgba(fillColor,0.18)} stroke={rgba(fillColor,0.75)} strokeWidth={1.6}/>
      {/* Attribute polygon (darker, drawn on top to show the 'floor') */}
      <polygon points={attrPts.join(" ")} fill={rgba(fillColor,0.38)} stroke={rgba(fillColor,0.95)} strokeWidth={1.2}/>
      {/* Dim labels */}
      {showLabels && labelPos.map(function(p,i){
        return <g key={"lb"+i}>
          <text x={p.x} y={p.y} textAnchor="middle" fontSize={11} fontWeight={700} fill={PC[p.dim]} fontFamily={FONT} letterSpacing="0.5">{p.dim}</text>
          <text x={p.x} y={p.y+11} textAnchor="middle" fontSize={9} fontWeight={500} fill="rgba(255,255,255,0.55)" fontFamily={FONT}>{Math.round(dimData[i].totalPct)}%</text>
        </g>;
      })}
      {/* Center dot */}
      <circle cx={cx} cy={cy} r={2} fill="rgba(255,255,255,0.3)"/>
    </svg>
  );
}

/* ── Starfield (deterministic) ── */
function LAUNCH_genStars(n, seed) {
  var s = [];
  for (var i = 0; i < n; i++) {
    seed = (seed * 9301 + 49297) % 233280;
    var x = (seed / 233280) * 100;
    seed = (seed * 9301 + 49297) % 233280;
    var y = (seed / 233280) * 100;
    seed = (seed * 9301 + 49297) % 233280;
    var op = 0.1 + (seed / 233280) * 0.5;
    seed = (seed * 9301 + 49297) % 233280;
    var sz = 0.5 + (seed / 233280) * 1.8;
    s.push({ x: x, y: y, op: op, sz: sz });
  }
  return s;
}

          The University of North Carolina at Chapel Hill
        </span>
      </div>
    </div>
  );
}

              <stop offset="100%" stopColor="#8a4a14"/>
            </linearGradient>
            <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="transparent"/>
              <stop offset="78%" stopColor="transparent"/>
              <stop offset="90%" stopColor="#8B3A00" stopOpacity="0.2"/>
              <stop offset="98%" stopColor="#F5A623" stopOpacity="0.35"/>
              <stop offset="100%" stopColor="#FFCC44" stopOpacity="0.45"/>
            </linearGradient>
          </defs>

          {/* Sky (edge-to-edge) */}
          <rect x={0} y={0} width={MBA_CW} height={MBA_SKY_BOT} fill="url(#skyGrad)"/>
          <rect x={0} y={0} width={MBA_CW} height={MBA_SKY_BOT} fill="url(#dawn)"/>

          {/* Background stars — scaled across sky */}
          {MBA_SF.map(function(st,i){var y=(st.y/MBA_SKY_H)*(MBA_SKY_BOT-10)+4;return <circle key={"sf"+i} cx={(st.x/MBA_CW)*MBA_CW} cy={y} r={st.r*0.7} fill={"rgba(255,255,255,"+(st.op*0.9)+")"}/>;})}
          {MBA_SM2.map(function(st,i){var y=(st.y/MBA_SKY_H)*(MBA_SKY_BOT-10)+4;return <circle key={"sm"+i} cx={(st.x/MBA_CW)*MBA_CW} cy={y} r={st.r*0.9} fill={"rgba(255,255,255,"+(st.op*1.5)+")"}/>;})}
          {MBA_SN2.map(function(st,i){var y=(st.y/MBA_SKY_H)*(MBA_SKY_BOT-10)+4;return <circle key={"sn"+i} cx={(st.x/MBA_CW)*MBA_CW} cy={y} r={st.r*1.1} fill={"rgba(255,255,255,"+(st.op*2.2)+")"}/>;})}

          {/* Roadmap rays — solid from earned career-skills to goal, dotted from latent */}
          {ns&&path&&(function(){
            var gx=MBA_CW/2, gy=62;
            return path.skills.map(function(sid){
              var sk=skillBy(sid); if(!sk) return null;
              var sx=sk.x/100*MBA_CW, sy=MBA_SKY_TOP+sk.y/100*MBA_SKY_H;
              var got=!!earnedState[sid];
              return <line key={"ray"+sid} x1={sx} y1={sy} x2={gx} y2={gy}
                stroke={got?rgba(pCol,0.38):rgba("#FFFFFF",0.14)}
                strokeWidth={got?1.1:0.8}
                strokeDasharray={got?"none":"2,5"}
                strokeLinecap="round"/>;
            });
          })()}

          {/* Constellation connections — earned skills within PIVOT domain */}
          {MBA_CONNS_LIVE.map(function(c,ci){
            var a=skillBy(c[0]),b=skillBy(c[1]);if(!a||!b)return null;
            var inDimA=!dimFilter||a.dim===dimFilter, inDimB=!dimFilter||b.dim===dimFilter;
            if(dimFilter&&!(inDimA&&inDimB))return null;
            var inCA=careerSet?!!careerSet[a.id]:true, inCB=careerSet?!!careerSet[b.id]:true;
            var dimmed=(careerSet&&!(inCA&&inCB));
            var col=PC[a.dim], op=dimmed?0.05:0.5, w=dimmed?0.8:2;
            var ax=a.x/100*MBA_CW, ay=MBA_SKY_TOP+a.y/100*MBA_SKY_H;
            var bx=b.x/100*MBA_CW, by=MBA_SKY_TOP+b.y/100*MBA_SKY_H;
            return <line key={"c"+ci} x1={ax} y1={ay} x2={bx} y2={by} stroke={rgba(col,op)} strokeWidth={w} strokeLinecap="round" style={{transition:"all 0.4s ease"}}/>;
          })}

          {/* Goal star zone (compact) */}
          {ns&&path&&(function(){
            var gx=MBA_CW/2, gy=56;
            var earnedOnPath=path.skills.filter(function(sid){return !!earnedState[sid];}).length;
            var total=path.skills.length;
            var floorKeys=Object.keys(path.floor||{});
            var floorMet=floorKeys.filter(function(k){var a=UBP_ATTRIBUTES.find(function(x){return x.dim===k;});return a&&a.current>=path.floor[k];}).length;
            var allFloor=floorMet===floorKeys.length;
            var baseTier = earnedOnPath>=MASTERY_THRESH ? "Mastery" : (earnedOnPath>=FLUENT_THRESH ? "Fluent" : (earnedOnPath>=READY_THRESH ? "Ready" : "Building"));
            var tierCol = baseTier==="Mastery"?"#FFFFFF":(baseTier==="Fluent"?"#FFE9A6":(baseTier==="Ready"?"#FFCC44":"rgba(255,255,255,0.6)"));
            var statusLine = earnedOnPath+"/"+total+" skills · "+(allFloor?"Foundation ready":floorMet+"/"+floorKeys.length+" foundations");
            var els=[];
            els.push(<circle key="gh" cx={gx} cy={gy} r={26} fill={pCol} filter="url(#goalGlow)" opacity={baseTier==="Building"?0.14:0.35}/>);
            els.push(<circle key="gs" cx={gx} cy={gy} r={10} fill={baseTier==="Mastery"?"#fff":pCol} stroke="#fff" strokeWidth={baseTier==="Building"?0.8:2} opacity={0.98}/>);
            if(baseTier==="Mastery"||baseTier==="Fluent") els.push(<circle key="gc" cx={gx} cy={gy} r={3.2} fill="#fff"/>);
            els.push(<text key="gt" x={gx} y={gy+32} textAnchor="middle" fontSize={18} fontWeight={800} fill={tierCol} fontFamily={FONT} letterSpacing="2">{baseTier.toUpperCase()}{!allFloor&&baseTier!=="Building"?" ∗":""}</text>);
            els.push(<text key="gsl" x={gx} y={gy+50} textAnchor="middle" fontSize={11} fontWeight={500} fill={allFloor?"rgba(255,255,255,0.72)":"rgba(255,210,120,0.8)"} fontFamily={FONT}>{statusLine}</text>);
            var meterY=gy+66, dotSpace=14, startX=gx-(total-1)*dotSpace/2;
            for(var di=0; di<total; di++){
              var dx=startX+di*dotSpace;
              var sid=path.skills[di];
              var got=!!earnedState[sid];
              var dotCol = got ? (di>=MASTERY_THRESH-1?"#fff":(di>=FLUENT_THRESH-1?"#FFE9A6":(di>=READY_THRESH-1?"#FFCC44":rgba(pCol,0.95)))) : "rgba(255,255,255,0.1)";
              var strokeCol = got ? "#fff" : rgba(pCol,0.35);
              els.push(<circle key={"gd"+di} cx={dx} cy={meterY} r={3.2} fill={dotCol} stroke={strokeCol} strokeWidth={got?0.8:1}/>);
            }
            return els;
          })()}
          {!ns&&(
            <g>
              <text x={MBA_CW/2} y={50} textAnchor="middle" fontSize={13} fontWeight={700} fill="rgba(255,255,255,0.65)" fontFamily={FONT} letterSpacing="3">PICK A NORTH STAR</text>
              <text x={MBA_CW/2} y={72} textAnchor="middle" fontSize={12} fontWeight={500} fill="rgba(255,255,255,0.45)" fontFamily={FONT}>tap a career above to light the path ahead</text>
            </g>
          )}

          {/* Skill stars */}
          {SKILLS.map(function(s){
            var x=s.x/100*MBA_CW, y=MBA_SKY_TOP+s.y/100*MBA_SKY_H, col=PC[s.dim];
            var earned=!!earnedState[s.id];
            var inCareer=careerSet?!!careerSet[s.id]:false;
            var dimmed=(careerSet&&!inCareer);
            var isSel=selSkill===s.id;
            var isCrossHL=selExp&&selExpObj&&selExpObj.skills.indexOf(s.id)>=0;
            var r=earned?11:8; if(isSel)r+=2;
            var opacity=dimmed?0.22:1;
            /* latent stars: brighter so they read clearly on the dark sky */
            var fill=rgba(col,earned?0.28:0.14);
            var stroke=rgba(col,earned?0.95:0.75);
            var strokeW=isSel?2.8:(earned?2:1.4);
            var showWhite=careerSet&&inCareer&&!dimmed;
            var lbl=s.label.length>24?s.label.slice(0,22)+"…":s.label;
            /* Labels: show only on earned / selected / cross-highlighted / career-relevant stars.
               Default latent stars are unlabeled to reduce visual noise. */
            var showLabel = earned || isSel || isCrossHL || showWhite;
            var lblFill = earned ? rgba(col,1) : "rgba(255,255,255,0.9)";
            var lblSize = earned ? 12 : 11;
            var lblWeight = earned ? 700 : 500;
            return (
              <g key={s.id} style={{cursor:"pointer",transition:"opacity 0.4s ease"}} opacity={opacity} onClick={function(){toggleSkill(s.id);}}>
                {showWhite&&<circle cx={x} cy={y} r={r+9} fill="#fff" filter="url(#whiteGlow)" opacity={0.32}/>}
                {showWhite&&<circle cx={x} cy={y} r={r+3} fill="none" stroke="#fff" strokeWidth={1.2} opacity={0.55}/>}
                {earned&&!dimmed&&<circle cx={x} cy={y} r={r+7} fill={rgba(col,0.1)}/>}
                {isSel&&<circle cx={x} cy={y} r={r+6} fill="none" stroke={col} strokeWidth={2} opacity={0.65} filter="url(#glow2)"/>}
                <circle cx={x} cy={y} r={r} fill={fill} stroke={stroke} strokeWidth={strokeW}/>
                {earned&&<circle cx={x} cy={y} r={r*0.42} fill="#fff" opacity={0.92}/>}
                {showLabel&&<text x={x} y={y+r+14} textAnchor="middle" fontSize={lblSize} fontWeight={lblWeight} fill={lblFill} fontFamily={FONT} style={{pointerEvents:"none"}}>{lbl}</text>}
              </g>
            );
          })}

          {/* Horizon line */}
          <line x1={0} y1={MBA_SKY_BOT} x2={MBA_CW} y2={MBA_SKY_BOT} stroke="#F5A623" strokeWidth={1} opacity={0.55}/>
          <line x1={0} y1={MBA_SKY_BOT+1.5} x2={MBA_CW} y2={MBA_SKY_BOT+1.5} stroke="#D4710A" strokeWidth={2} opacity={0.35}/>

          {/* Attribute + Skill readiness bars (new stacked model) */}
          <rect x={0} y={MBA_SKY_BOT+3} width={MBA_CW} height={MBA_ATTR_H} fill="#060412" style={{pointerEvents:"none"}}/>
          <text x={16} y={MBA_SKY_BOT+20} fontSize={11} fontWeight={700} fill="rgba(255,255,255,0.75)" fontFamily={FONT} letterSpacing="2">READINESS</text>
          <text x={MBA_CW-16} y={MBA_SKY_BOT+20} textAnchor="end" fontSize={9} fontWeight={500} fill="rgba(255,255,255,0.4)" fontFamily={FONT} letterSpacing="1">UBP_ATTRIBUTES + SKILLS</text>
          {UBP_ATTRIBUTES.map(function(a,ai){
            var rowY=MBA_SKY_BOT+30+ai*17;
            var col=PC[a.dim];
            var labels={P:"PUR",I:"INT",V:"VIS",O:"OWN",T:"TRA"};
            var barX=48, barW=MBA_CW-80, barH=8;
            var myAttrs2={}; UBP_ATTRIBUTES.forEach(function(x){myAttrs2[x.dim]=x.current;});
            var r = computeReadiness(a.dim, earnedState, myAttrs2);
            var attrW = (r.attrPct/100)*barW;
            var totalW = (r.totalPct/100)*barW;
            var tgt = path ? targetForPath(path)[a.dim] : null;
            var tgtX = tgt!==null ? barX+(tgt/100)*barW : null;
            /* Midline: 50% marker showing attribute ceiling */
            var midX = barX + 0.5*barW;
            return (
              <g key={"attr"+ai}>
                <text x={14} y={rowY+8} fontSize={11} fontWeight={700} fill={col} fontFamily={FONT} letterSpacing="0.5">{labels[a.dim]}</text>
                {/* Background track (full bar) */}
                <rect x={barX} y={rowY} width={barW} height={barH} rx={4} ry={4} fill="rgba(255,255,255,0.05)"/>
                {/* 50% attribute-ceiling mark */}
                <line x1={midX} y1={rowY-1} x2={midX} y2={rowY+barH+1} stroke="rgba(255,255,255,0.22)" strokeWidth={1} strokeDasharray="1,2"/>
                {/* Skills portion (lighter) from attr boundary to total */}
                <rect x={barX+attrW} y={rowY} width={Math.max(0,totalW-attrW)} height={barH} rx={0} ry={0} fill={rgba(col,0.45)}/>
                {/* Attribute portion (saturated) — drawn on top */}
                <rect x={barX} y={rowY} width={attrW} height={barH} rx={4} ry={4} fill={rgba(col,0.95)}/>
                {/* Target hash mark (when career selected) */}
                {tgtX!==null && <g>
                  <line x1={tgtX} y1={rowY-4} x2={tgtX} y2={rowY+barH+4} stroke="#FFCC44" strokeWidth={2}/>
                  <text x={tgtX} y={rowY-6} textAnchor="middle" fontSize={8} fontWeight={700} fill="#FFCC44" fontFamily={FONT}>{tgt}</text>
                </g>}
                {/* Combined % on right */}
                <text x={MBA_CW-14} y={rowY+8} textAnchor="end" fontSize={11} fontWeight={700} fill="rgba(255,255,255,0.88)" fontFamily={FONT}>{Math.round(r.totalPct)}%</text>
              </g>
            );
          })}
        </svg>
      </div>
{/* Detail panel — skill info (with reflection) or experience info */}
      <div style={{minHeight:(selSkillObj||selExpObj)?200:46,maxHeight:(selSkillObj||selExpObj)?320:46,transition:"all 0.3s ease",overflowY:(selSkillObj||selExpObj)?"auto":"hidden",borderTop:"1px solid "+rgba(CB,0.08),background:rgba(CN,0.7)}}>
        {selSkillObj?(
          <div style={{padding:"14px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,paddingRight:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:PC[selSkillObj.dim],display:"inline-block"}}></span>
                  <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{selSkillObj.label}</span>
                  {earnedState[selSkillObj.id]?<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:rgba("#50C878",0.15),color:"#50C878",fontWeight:600,letterSpacing:0.3}}>EARNED</span>:<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:rgba(PC[selSkillObj.dim],0.1),color:rgba(PC[selSkillObj.dim],0.8),fontWeight:600,letterSpacing:0.3}}>LATENT</span>}
                </div>
                <div style={{fontSize:12,color:PC[selSkillObj.dim],fontWeight:600,opacity:0.85}}>{DIM_NAMES[selSkillObj.dim]}</div>
              </div>
              <div onClick={function(){setSelSkill(null);}} style={{padding:"4px 10px",borderRadius:8,cursor:"pointer",background:rgba(CB,0.08),fontSize:13,color:"rgba(255,255,255,0.5)"}}>✕</div>
            </div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.5,marginBottom:10,fontStyle:"italic"}}>"{selSkillObj.def}"</div>
            {earnedState[selSkillObj.id]?(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Earned through</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {ubp_earnedVia(selSkillObj.id, earnedPreset).map(function(e){return <span key={e.id} onClick={function(){toggleExp(e.id);}} style={{fontSize:11,padding:"4px 9px",borderRadius:10,background:rgba(PC[selSkillObj.dim],0.1),border:"1px solid "+rgba(PC[selSkillObj.dim],0.3),color:"rgba(255,255,255,0.85)",cursor:"pointer"}}>{UBP_EXP_ICON[e.type]} {e.label}</span>;})}
                </div>
              </div>
            ):(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Develop through</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {ubp_willEarnVia(selSkillObj.id, earnedPreset).length?ubp_willEarnVia(selSkillObj.id, earnedPreset).map(function(e){return <span key={e.id} onClick={function(){toggleExp(e.id);}} style={{fontSize:11,padding:"4px 9px",borderRadius:10,background:rgba(PC[selSkillObj.dim],0.05),border:"1px dashed "+rgba(PC[selSkillObj.dim],0.3),color:"rgba(255,255,255,0.65)",cursor:"pointer"}}>{UBP_EXP_ICON[e.type]} {e.label}</span>;}):<span style={{fontSize:12,color:"rgba(255,255,255,0.35)"}}>No tagged experiences yet — explore electives and immersions.</span>}
                </div>
              </div>
            )}
            <div style={{marginTop:10}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Your reflection</div>
              {reflections[selSkillObj.id]&&!draft?(
                <div>
                  <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.5,padding:"8px 10px",background:rgba(CB,0.05),borderLeft:"2px solid "+rgba(PC[selSkillObj.dim],0.5),borderRadius:4,marginBottom:6}}>{reflections[selSkillObj.id]}</div>
                  <div onClick={function(){setDraft(reflections[selSkillObj.id]);}} style={{fontSize:12,color:rgba(PC[selSkillObj.dim],0.85),cursor:"pointer",fontWeight:600}}>Edit reflection</div>
                </div>
              ):(
                <div>
                  <textarea value={draft} onChange={function(ev){setDraft(ev.target.value);}} placeholder={earnedState[selSkillObj.id]?"When did you practice this skill? What did you notice about yourself?":"How might you develop this skill in the coming terms?"} style={{width:"100%",minHeight:60,background:rgba(CB,0.04),border:"1px solid "+rgba(PC[selSkillObj.dim],0.3),borderRadius:6,padding:"8px 10px",color:"#fff",fontSize:13,fontFamily:FONT,resize:"vertical",outline:"none"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,marginTop:6}}>
                    <div onClick={function(){
                      /* Coach-generated Socratic prompt, grounded in how this skill was earned (or will develop) */
                      var sk=selSkillObj;
                      var earned=!!earnedState[sk.id];
                      var src=earned?ubp_earnedVia(sk.id,earnedPreset):ubp_willEarnVia(sk.id,earnedPreset);
                      var sourceName = src.length ? src[0].label : (earned?"a recent experience":"an upcoming experience");
                      var prompts = earned ? [
                        "Think about "+sourceName+". What did you notice about yourself in a moment when this skill was tested?",
                        "Describe a specific instance in "+sourceName+" where you did this well — and a moment you didn't. What was the difference?",
                        "If someone watched you in "+sourceName+", what would they have seen you doing? What would they have missed?",
                        "This skill is about \""+sk.def.toLowerCase().slice(0,80)+"…\" — where in "+sourceName+" did that show up for you? Where did it not?",
                      ] : [
                        "Before "+sourceName+" begins, what part of this skill feels most distant from how you operate now?",
                        "Imagine a moment in "+sourceName+" where you'd need this skill. What would it look like if you had it? What usually happens instead?",
                        "Who have you seen do this well? What specifically were they doing that you could try?",
                      ];
                      var p = prompts[Math.floor(Math.random()*prompts.length)];
                      setDraft(draft?draft+"\n\n"+p:p);
                    }} style={{fontSize:11,padding:"5px 11px",borderRadius:14,background:"rgba(255,204,68,0.12)",border:"1px solid rgba(255,204,68,0.35)",color:"#FFCC44",cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",gap:5}}>✨ Help me reflect</div>
                    <div style={{display:"flex",gap:8}}>
                      {draft&&<div onClick={function(){setDraft("");}} style={{fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer",color:"rgba(255,255,255,0.5)"}}>Cancel</div>}
                      <div onClick={saveReflection} style={{fontSize:12,padding:"5px 14px",borderRadius:6,cursor:"pointer",background:draft.trim()?rgba(PC[selSkillObj.dim],0.2):rgba(CB,0.08),border:"1px solid "+rgba(PC[selSkillObj.dim],draft.trim()?0.5:0.2),color:draft.trim()?PC[selSkillObj.dim]:"rgba(255,255,255,0.3)",fontWeight:600}}>Save</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        ):selExpObj?(
          <div style={{padding:"14px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,paddingRight:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:18}}>{UBP_EXP_ICON[selExpObj.type]||"★"}</span>
                  <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{selExpObj.label}</span>
                  {ubp_isDone(selExpObj, earnedPreset)?<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:rgba("#50C878",0.15),color:"#50C878",fontWeight:600,letterSpacing:0.3}}>DONE</span>:<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:rgba(CB,0.12),color:rgba(CB,0.85),fontWeight:600,letterSpacing:0.3}}>UPCOMING</span>}
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{selExpObj.type.charAt(0).toUpperCase()+selExpObj.type.slice(1)} · {UBP_BUCKETS[selExpObj.bucket]?UBP_BUCKETS[selExpObj.bucket].label:""}</div>
              </div>
              <div onClick={function(){setSelExp(null);}} style={{padding:"4px 10px",borderRadius:8,cursor:"pointer",background:rgba(CB,0.08),fontSize:13,color:"rgba(255,255,255,0.5)"}}>✕</div>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{ubp_isDone(selExpObj, earnedPreset)?"Developed these skills":"Will develop these skills"}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {selExpObj.skills.map(function(sid){var sk=skillBy(sid);if(!sk)return null;var col=PC[sk.dim];var ear=!!earnedState[sid];return <span key={sid} onClick={function(){toggleSkill(sid);}} style={{fontSize:11,padding:"4px 10px",borderRadius:10,background:rgba(col,ear?0.15:0.05),border:"1px "+(ear?"solid":"dashed")+" "+rgba(col,ear?0.5:0.3),color:ear?"#fff":"rgba(255,255,255,0.7)",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,borderRadius:"50%",background:col,display:"inline-block"}}></span>{sk.label}</span>;})}
            </div>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"14px 0"}}>
            <div style={{fontSize:14,color:ns?rgba(pCol,0.6):(dimFilter?rgba(PC[dimFilter],0.6):"rgba(255,255,255,0.25)")}}>{ns?path.label+" skills illuminated · Tap a star to explore":(dimFilter?DIM_NAMES[dimFilter]+" skills highlighted":"Tap a star to see how you earned it · Tap a tile to see skills it develops")}</div>
          </div>
        )}
      </div>

      <BottomNav active={nav} setActive={setNav} color={CB} onSwitch={props.onSwitch} items={DEFAULT_NAV_ITEMS}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"4px 0 6px",background:rgba(CN,0.9)}}>
        <img src={UNC_LOGO} alt="UNC" style={{width:14,height:14,objectFit:"contain"}}/>
        <span style={{fontSize:9,color:rgba(CB,0.5),letterSpacing:1.5,textTransform:"uppercase"}}>UNC Kenan-Flagler Business School</span>
      </div>

      <PIVOTAssessment open={showAssessment} form={assessmentForm} initial={assessment && assessment.form===assessmentForm ? assessment.responses : {}} onSave={saveAssessment} onClose={function(){setShowAssessment(false);}}/>
    </div>
  );
}

  var _filter = useState("all");

      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(12px)",

              <div key={i} style={{
                flex: "1 0 0", minWidth: 78, textAlign: "center",

                borderRadius: 12, padding: "10px 6px 8px",

            background: rgba(CN, 0.4), border: "1px solid " + rgba(CB, 0.06),
            borderRadius: 16, padding: "16px", display: "flex", justifyContent: "center",
          }}>
            <svg width={220} height={220} viewBox="0 0 220 220">
              {/* Grid rings */}
              {[1, 2, 3, 4, 5].map(function (level) {
                var r = (level / 5) * R;
                return (
                  <polygon key={level}
                    points={DIMS.map(function (d, i) { return pt(i, r).join(","); }).join(" ")}
                    fill="none" stroke={rgba(CB, 0.08)} strokeWidth={1}
                  />
                );
              })}
              {/* Axis lines */}
              {DIMS.map(function (d, i) {
                var p = pt(i, R);
                return <line key={d} x1={cx} y1={cy} x2={p[0]} y2={p[1]} stroke={rgba(CB, 0.06)} strokeWidth={1} />;
              })}
              {/* Baseline polygon */}
              <polygon points={poly(UBP_BASELINE)} fill={rgba(CB, 0.05)} stroke={rgba(CB, 0.15)} strokeWidth={1} strokeDasharray="4,3" />
              {/* Current polygon */}
              <polygon points={poly(UBP_SCORES)} fill={rgba(CB, 0.1)} stroke={CB} strokeWidth={2} />
              {/* Score dots */}
              {DIMS.map(function (d, i) {
                var p = pt(i, (UBP_SCORES[d] / 5) * R);
                return <circle key={d} cx={p[0]} cy={p[1]} r={4} fill={PC[d]} stroke="#fff" strokeWidth={1.5} />;
              })}
              {/* Labels */}
              {DIMS.map(function (d, i) {
                var labelR = R + 20;
                var p = pt(i, labelR);
                return (
                  <text key={d} x={p[0]} y={p[1]}
                    textAnchor="middle" dominantBaseline="middle"
                    fontSize={12} fontWeight={600} fill={PC[d]} fontFamily={FONT}
                  >{d} {UBP_SCORES[d]}</text>
                );
              })}
            </svg>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 16, height: 2, background: CB, borderRadius: 1 }} />
              <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>Current</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 16, height: 2, background: rgba(CB, 0.3), borderRadius: 1, borderTop: "1px dashed " + rgba(CB, 0.4) }} />
              <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>Baseline</span>
            </div>
          </div>
        </div>

        <div style={{ height: 10 }} />
      </div>

      {/* ── Bottom Nav ── */}
      <BottomNav active={activeNav} setActive={setActiveNav} color={CB} onSwitch={props.onSwitch} />

      {/* ── Footer ── */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
        padding: "4px 0 6px", background: rgba(CN, 0.9),
      }}>
        <img src={UNC_LOGO} alt="UNC" style={{ width: 14, height: 14, objectFit: "contain" }} />
        <span style={{ fontSize: 9, color: rgba(CB, 0.5), letterSpacing: 1.5, textTransform: "uppercase" }}>
          UNC Kenan-Flagler Undergraduate Business
        </span>
      </div>
    </div>
  );
}

function UBP_TokenBar(props) {
  var CB = "#4B9CD3";
  var dim = props.dim;
  var data = props.data;
  var expanded = props.expanded;
  var onToggle = props.onToggle;
  var attrs = props.attrs || {};
  var earnedMap = props.earnedMap || {};
  var path = props.path || null;
  var earned = data.earned.length;
  var total = data.total;
  var color = PC[dim];
  /* Readiness stack: attributes fill first 50%, skills the next 50% */
  var r = computeReadiness(dim, earnedMap, attrs);
  var target = path ? targetForPath(path)[dim] : null;
  var floor = path && path.floor && path.floor[dim];
  var floorPct = floor ? (floor/5)*50 : null;

  return (
    <div style={{ marginBottom: 6 }}>
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 12, padding: "14px 16px",
          background: rgba(color, 0.06), borderRadius: expanded ? "14px 14px 0 0" : 14,
          border: "1px solid " + rgba(color, expanded ? 0.25 : 0.1),
          cursor: "pointer", transition: "all 0.2s",
        }}
      >
        <div style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "linear-gradient(135deg," + rgba(color, 0.3) + "," + rgba(color, 0.08) + ")",
          border: "2px solid " + rgba(color, 0.5),
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 15, fontWeight: 700, color: color,
        }}>{dim}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 16, fontWeight: 600, color: "rgba(255,255,255,0.85)" }}>{DIM_NAMES[dim]}</span>
            <span style={{ fontSize: 13, color: "rgba(255,255,255,0.55)" }}>
              <span style={{ fontWeight: 700, color: "#fff" }}>{Math.round(r.totalPct)}%</span>
              <span style={{ margin: "0 6px", color: "rgba(255,255,255,0.2)" }}>·</span>
              <span>{earned}/{total} tokens</span>
            </span>
          </div>
          <div style={{ position: "relative", height: 10, background: "rgba(255,255,255,0.05)", borderRadius: 5 }}>
            <div style={{ position:"absolute", left:"50%", top:-2, bottom:-2, width:1, background:"rgba(255,255,255,0.22)" }}></div>
            <div style={{ position:"absolute", left:r.attrPct+"%", top:0, height:"100%", width:Math.max(0,(r.totalPct-r.attrPct))+"%", background: rgba(color,0.45), transition:"width 0.8s ease" }}></div>
            <div style={{ position:"absolute", left:0, top:0, height:"100%", width:r.attrPct+"%", borderRadius: "5px 0 0 5px", background: rgba(color,0.95), transition:"width 0.8s ease" }}></div>
            {floorPct!==null && <div style={{ position:"absolute", left:floorPct+"%", top:-3, bottom:-3, width:2, background:"#FFCC44", opacity:0.9 }}></div>}
            {target!==null && <div style={{ position:"absolute", left:target+"%", top:-4, bottom:-4, width:2, background:"#50C878" }}></div>}
          </div>
          {path && (
            <div style={{ display:"flex", gap:10, marginTop:4, fontSize:10, color:"rgba(255,255,255,0.45)" }}>
              {floorPct!==null && <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ display:"inline-block", width:2, height:8, background:"#FFCC44" }}></span>Floor {floor}</span>}
              {target!==null && <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ display:"inline-block", width:2, height:8, background:"#50C878" }}></span>Target {target}%</span>}
            </div>
          )}
        </div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", transform: expanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>▼</div>
      </div>
      {expanded && (
        <div style={{
          background: rgba(color, 0.03), border: "1px solid " + rgba(color, 0.12),
          borderTop: "none", borderRadius: "0 0 14px 14px", padding: "12px 16px",
        }}>
          {data.earned.map(function (t, i) {
            return (
              <div key={"e" + i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10 }}>
                <span style={{ fontSize: 18 }}>{t.icon}</span>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,0.8)" }}>{t.label}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>{t.date} — {t.detail}</div>
                </div>
                <span style={{ marginLeft: "auto", fontSize: 13, color: rgba(color, 0.6), fontWeight: 600 }}>✓</span>
              </div>
            );
          })}
          {data.locked.map(function (t, i) {
            return (
              <div key={"l" + i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10, opacity: 0.35 }}>
                <span style={{ fontSize: 18 }}>{t.icon}</span>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: "rgba(255,255,255,0.6)" }}>{t.label}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", marginTop: 2 }}>{t.hint}</div>
                </div>
                <span style={{ marginLeft: "auto", fontSize: 13, color: "rgba(255,255,255,0.2)" }}>🔒</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function UBP_BadgeWall(props) {
  var CB = "#4B9CD3";
  var badges = props.badges;
  var earned = 0;
  for (var i = 0; i < badges.length; i++) { if (badges[i].earned) earned++; }
  return (
    <div style={{ padding: "12px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: 1 }}>Badges</div>
        <div style={{ fontSize: 13, color: rgba(CB, 0.5) }}>{earned}/{badges.length} earned</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
        {badges.map(function (b) {
          var e = b.earned;
          return (
            <div key={b.id} style={{
              textAlign: "center", padding: "12px 4px 10px",
              background: e ? rgba(CB, 0.06) : rgba(CN, 0.4),
              border: "1px solid " + (e ? rgba(CB, 0.15) : rgba(CB, 0.04)),
              borderRadius: 12, transition: "all 0.3s",
            }}>
              <div style={{
                fontSize: 28, marginBottom: 6, lineHeight: 1,
                filter: e ? "none" : "grayscale(1) brightness(0.55)",
                opacity: e ? 1 : 0.35,
              }}>{b.icon}</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: e ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.2)", lineHeight: 1.3 }}>{b.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function UBP_SelfReflection(props) {

function UBP_BossLevel(props) {
  var CB = "#4B9CD3";
  var unlocked = props.unlocked;
  var completed = props.completed;
  var totalEarned = props.totalEarned;
  var totalRequired = props.totalRequired;
  return (
    <div style={{ padding: "8px 16px 8px" }}>
      <div style={{
        background: unlocked
          ? "linear-gradient(135deg," + rgba(CB, 0.15) + "," + rgba("#FFD93D", 0.08) + ")"
          : rgba(CN, 0.5),
        border: "1px solid " + (unlocked ? rgba(CB, 0.3) : rgba(CB, 0.06)),
        borderRadius: 14, padding: "14px 16px",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <span style={{ fontSize: 24, opacity: unlocked ? 1 : 0.3 }}>{completed ? "🏆" : unlocked ? "🔓" : "🔒"}</span>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: unlocked ? "#FFD93D" : "rgba(255,255,255,0.3)" }}>
              {completed ? "Capstone Complete!" : unlocked ? "Capstone Unlocked" : "Senior Leadership Capstone"}
            </div>
            <div style={{ fontSize: 12, color: unlocked ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.2)" }}>
              {completed
                ? "You've achieved mastery across all dimensions."
                : unlocked
                  ? "You're ready for the integrative capstone reflection."
                  : "Reach 80% in all dimensions to unlock. " + totalEarned + " of ~" + totalRequired + " tokens earned."}
            </div>
          </div>
        </div>
        {!unlocked && (
          <div style={{ height: 4, background: rgba(CB, 0.08), borderRadius: 2, marginTop: 4 }}>
            <div style={{
              height: "100%", borderRadius: 2,
              width: Math.min(100, Math.round((totalEarned / totalRequired) * 100)) + "%",
              background: "linear-gradient(90deg," + CB + "," + rgba("#FFD93D", 0.7) + ")",
              transition: "width 1s ease",
            }} />
          </div>
        )}
      </div>
    </div>
  );
}

function UBPTeam(props) {
  var CB = "#4B9CD3";

  }, []);

  var _svy = useState(null); var svyOpen = _svy[0], setSvyOpen = _svy[1];
  var _ans = useState({}); var answers = _ans[0], setAnswers = _ans[1];
  /* per-team saved surveys: { teamId: { surveyId: {ts, responses} } } */

  /* Activity log (per-team list of completed activities) */
  var _log = useState({}); var actLog = _log[0], setActLog = _log[1];
  /* Disbanded teams (archived) */
  var _disb = useState({}); var disbanded = _disb[0], setDisbanded = _disb[1];
  var _confirmDisband = useState(null); var confirmDisband = _confirmDisband[0], setConfirmDisband = _confirmDisband[1];

  function disbandTeam(teamId){

    try { localStorage.setItem("ubp_team_disbanded", JSON.stringify(next)); } catch(e){}
    setTeamOpen(null);
    setConfirmDisband(null);
  }
  function reviveTeam(teamId){
    var next = Object.assign({}, disbanded); delete next[teamId];
    setDisbanded(next);
    try { localStorage.setItem("ubp_team_disbanded", JSON.stringify(next)); } catch(e){}
  }

  useEffect(function(){
    try {
      var v = localStorage.getItem("ubp_team_surveys_v2");
      if (v) setSavedSurveys(JSON.parse(v));
      else setSavedSurveys(UBP_TEAM_DEMO_SURVEYS);
    } catch(e){ setSavedSurveys(UBP_TEAM_DEMO_SURVEYS); }
    try {
      var lg = localStorage.getItem("ubp_team_activity_log");
      if (lg) setActLog(JSON.parse(lg));
      else setActLog(UBP_TEAM_DEMO_ACTIVITIES);
    } catch(e){ setActLog(UBP_TEAM_DEMO_ACTIVITIES); }
    try {
      var db = localStorage.getItem("ubp_team_disbanded");
      if (db) setDisbanded(JSON.parse(db));
    } catch(e){}
  }, []);

  /* Answers are scoped to teamId+":"+surveyId+":"+questionIndex */
  function setAnswer(teamId, svyId, qIdx, val){
    var key = teamId + ":" + svyId + ":" + qIdx;
    var next = Object.assign({}, answers); next[key] = val; setAnswers(next);
  }
  function saveSurvey(teamId, svyId){
    var s = UBP_TEAM_SURVEYS.filter(function(x){return x.id===svyId;})[0];
    if (!s || !teamId) return;
    var responses = s.questions.map(function(_,i){ return answers[teamId+":"+svyId+":"+i] || null; });
    var next = Object.assign({}, savedSurveys);
    var teamMap = Object.assign({}, next[teamId] || {});
    teamMap[svyId] = { ts: Date.now(), responses: responses };
    next[teamId] = teamMap;
    setSavedSurveys(next);

  var topSkills = skillList.slice().sort(function(a,b){return b.count-a.count;}).slice(0,5);
  var rareSkills = skillList.slice().sort(function(a,b){return a.count-b.count;}).slice(0,5);

  var focusCounts = {};
  UBP_COHORT.forEach(function(s){ focusCounts[s.focus] = (focusCounts[s.focus]||0) + 1; });
  var focusList = Object.keys(focusCounts).map(function(k){ return {label:k, count:focusCounts[k], pct:Math.round(focusCounts[k]/cohortSize*100)}; }).sort(function(a,b){return b.count-a.count;});

  return (
    <div style={{ width:"100%", maxWidth:430, margin:"0 auto", height:"calc(var(--vh, 1vh) * 100)", minHeight:700, background:"linear-gradient(170deg,"+CN+" 0%,#0c0c24 50%,#080816 100%)", display:"flex", flexDirection:"column", overflow:"hidden", fontFamily:FONT, userSelect:"none", WebkitFontSmoothing:"antialiased" }}>

        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div onClick={function(){setShowDemo(!showDemo);}} style={{ padding:"5px 10px", borderRadius:12, background: showDemo?rgba("#FFCC44",0.18):rgba(CB,0.08), border:"1px solid "+(showDemo?rgba("#FFCC44",0.5):rgba(CB,0.25)), cursor:"pointer", fontSize:10, fontWeight:700, color: showDemo?"#FFCC44":"rgba(255,255,255,0.55)", letterSpacing:"1", fontFamily:FONT }}>DEMO</div>

                DIMS.forEach(function(d){ dimScore += (s.attrs[d]/5) * (tt.emphasis[d]||0); });
                var skillOverlap = tt.needSkills.filter(function(sk){return s.skills.indexOf(sk)>=0;}).length / tt.needSkills.length;
                return dimScore*0.6 + skillOverlap*0.4;

              var ranked = UBP_COHORT.slice().sort(function(a,b){return matchScore(b)-matchScore(a);});
              /* Coach recommendation: top students but enforce some diversity — pick top candidates ensuring different dominant dims */
              function dominantDim(s){ return DIMS.reduce(function(best,d){return s.attrs[d]>s.attrs[best]?d:best;}, "P"); }
              var coachRec = [];
              var usedDims = {};

                var dd = dominantDim(s);

              /* If we still need more, pad from ranked */

              function toggle(id){

              var picked = picks.map(getStudent).filter(Boolean);
              var pickedMeans = {P:0,I:0,V:0,O:0,T:0};
              if (picked.length) DIMS.forEach(function(d){ picked.forEach(function(m){pickedMeans[d]+=m.attrs[d];}); pickedMeans[d]=pickedMeans[d]/picked.length; });
              var pickedCover = {};
              picked.forEach(function(m){ m.skills.forEach(function(sid){ pickedCover[sid]=1; }); });
              var needMet = tt.needSkills.filter(function(sk){return pickedCover[sk];}).length;

                    <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                      {coachRec.map(function(m){var dd=dominantDim(m);return <div key={m.id} style={{ padding:"4px 8px", borderRadius:12, background:rgba(PC[dd],0.15), border:"1px solid "+rgba(PC[dd],0.35), fontSize:11, color:"#fff" }}>{m.initials} · {dd}</div>;})}
                    </div>
                    <div onClick={acceptCoach} style={{ display:"inline-block", padding:"6px 14px", borderRadius:10, background:"rgba(255,204,68,0.2)", border:"1px solid rgba(255,204,68,0.5)", fontSize:12, fontWeight:700, color:"#FFCC44", cursor:"pointer" }}>Accept this team</div>
                  </div>

                  {/* Your selection preview */}
                  {picked.length>0 && (
                    <div style={{ padding:"10px 12px", borderRadius:10, background:rgba(CB,0.05), border:"1px solid "+rgba(CB,0.15), marginBottom:12 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.5)", letterSpacing:1.3, marginBottom:6 }}>YOUR SELECTION · {picked.length}/{tt.size}</div>
                      <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                        {DIMS.map(function(d){return <div key={d} style={{ flex:1, textAlign:"center" }}><div style={{ fontSize:9, fontWeight:700, color:rgba(PC[d],0.75) }}>{d}</div><div style={{ fontSize:12, fontWeight:700, color:"#fff" }}>{(pickedMeans[d]||0).toFixed(1)}</div></div>;})}
                      </div>
                      <div style={{ display:"flex", gap:6, fontSize:11 }}>
                        <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.7)" }}>Diversity {pickedDiv.toFixed(2)}</div>
                        <div style={{ padding:"3px 8px", borderRadius:8, background:"rgba(80,200,120,0.12)", color:"#7ad99a" }}>{needMet}/{tt.needSkills.length} critical skills</div>
                      </div>
                    </div>
                  )}

                  {/* Ranked cohort — tap to add/remove */}
                  <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:1.3, marginBottom:6 }}>UBP_COHORT · RANKED BY FIT</div>
                  <div>
                    {ranked.filter(function(s){return !s.isMe;}).slice(0,18).map(function(s){
                      var on = picks.indexOf(s.id)>=0;
                      var dd = dominantDim(s);
                      var ms = Math.round(matchScore(s)*100);
                      return (
                        <div key={s.id} onClick={function(){toggle(s.id);}} style={{ padding:"9px 11px", borderRadius:10, background:on?rgba(CB,0.18):"rgba(255,255,255,0.03)", border:"1px solid "+(on?rgba(CB,0.5):"rgba(255,255,255,0.07)"), display:"flex", alignItems:"center", gap:10, marginBottom:5, cursor:"pointer" }}>
                          <div style={{ width:30, height:30, borderRadius:"50%", background:rgba(PC[dd],0.2), display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff" }}>{s.initials}</div>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{s.name}</div>
                            <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)" }}>{s.focus} · strongest {DIM_NAMES[dd]} {s.attrs[dd].toFixed(1)}</div>
                          </div>
                          <div style={{ fontSize:11, fontWeight:700, color:on?"#fff":"rgba(255,255,255,0.5)", minWidth:32, textAlign:"right" }}>{ms}%</div>
                        </div>
                      );
                    })}
                  </div>

                </div>
              );
            })()}
          </div>
        )}
      </div>

      <BottomNav active={activeNav} setActive={setActiveNav} color={CB} onSwitch={props.onSwitch} items={DEFAULT_NAV_ITEMS} />
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"4px 0 6px", background:rgba(CN,0.9) }}>
        <img src={UNC_LOGO} alt="UNC" style={{ width:14, height:14, objectFit:"contain" }} />
        <span style={{ fontSize:9, color:rgba(CB,0.5), letterSpacing:1.5, textTransform:"uppercase" }}>UNC Kenan-Flagler Business School</span>
      </div>
    </div>
  );
}

/* ── Message Renderer ── */
function UBP_MessageContent(props) {
  var CB = "#4B9CD3";
  var blocks = props.blocks;
  if (!blocks) return null;

  return (
    <div>
      {blocks.map(function (block, i) {
        if (block.type === "text") {
          return (
            <div key={i} style={{
              fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.7,
              whiteSpace: "pre-wrap", marginBottom: 10,
            }}>
              {block.content}
            </div>
          );
        }
        if (block.type === "pivot-cards") {
          return (
            <div key={i} style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
              {block.cards.map(function (card, ci) {
                return (
                  <div key={ci} style={{
                    background: rgba(PC[card.dim], 0.08),
                    border: "1px solid " + rgba(PC[card.dim], 0.2),
                    borderRadius: 12, padding: "12px 14px",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{
                        width: 28, height: 28, borderRadius: "50%",
                        background: rgba(PC[card.dim], 0.2),
                        border: "2px solid " + rgba(PC[card.dim], 0.5),
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, fontWeight: 700, color: PC[card.dim],
                      }}>{card.dim}</div>
                      <span style={{ fontSize: 14, fontWeight: 600, color: PC[card.dim] }}>{card.label}</span>
                      <span style={{ marginLeft: "auto", fontSize: 18, fontWeight: 700, color: PC[card.dim] }}>{card.score}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.6 }}>{card.note}</div>
                  </div>
                );
              })}
            </div>
          );
        }
        if (block.type === "story") {
          return (
            <div key={i} style={{
              background: rgba(CB, 0.06),
              border: "1px solid " + rgba(CB, 0.12),
              borderRadius: 12, padding: "14px 16px", marginBottom: 12,
            }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: rgba(CB, 0.8), textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>{block.title}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.75)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{block.content}</div>
            </div>
          );
        }
        if (block.type === "insight") {
          var isFor = block.title.indexOf("For") > -1;
          var borderColor = isFor ? rgba("#50C878", 0.25) : rgba("#FF6B6B", 0.25);
          var bgColor = isFor ? rgba("#50C878", 0.04) : rgba("#FF6B6B", 0.04);
          return (
            <div key={i} style={{
              background: bgColor,
              border: "1px solid " + borderColor,
              borderRadius: 12, padding: "12px 14px", marginBottom: 8,
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: isFor ? "#50C878" : "#FF6B6B", marginBottom: 6 }}>{block.title}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>{block.content}</div>
            </div>
          );
        }
        return null;
      })}
    </div>
  );
}

var MBA_CW = 430, MBA_CH = 826;
var MBA_GOAL_H = 130;        /* top goal-star zone */
var MBA_SKY_TOP = MBA_GOAL_H;
var MBA_SKY_H = 546;         /* sky area height (reduced ~30% from 780) */
var MBA_SKY_BOT = MBA_SKY_TOP + MBA_SKY_H;   /* horizon line */
var MBA_ATTR_H = 118;        /* attribute foundation band */

/* ── Attribute foundation (PIVOT survey scores: baseline at orientation → current) ── */
var ATTRIBUTES = [
  { dim:"P", baseline:3.2, current:3.7 },

/* ── Readiness math (attributes fill to 50%, skills fill remaining 50%) ── */
/* computeReadiness returns {attrPct, skillPct, totalPct} where attrPct+skillPct = totalPct, all 0..100 */
function computeReadiness(dim, earnedMap, attrs){
  var attr = (attrs && attrs[dim] != null) ? attrs[dim] : 0;
  var attrPct = Math.max(0, Math.min(50, (attr/5)*50));
  var skillsInDim = SKILLS.filter(function(s){ return s.dim===dim && earnedMap && earnedMap[s.id]; }).length;
  var skillPct = Math.max(0, Math.min(50, (skillsInDim/6)*50));
  return { attrPct: attrPct, skillPct: skillPct, totalPct: attrPct+skillPct, skillsInDim: skillsInDim };
}
/* Target per dim, derived from each career's 12 critical skills.
   More skills in a dim => higher target. Linear mapping gives each career
   a distinctive (lopsided) pentagon instead of a near-even polygon. */
function targetForPath(path){
  var t = {};
  if (!path) { DIMS.forEach(function(d){ t[d] = 55; }); return t; }
  var counts = {P:0,I:0,V:0,O:0,T:0};
  (path.skills||[]).forEach(function(sid){
    var s = skillBy(sid); if (s) counts[s.dim]++;
  });
  var total = (path.skills||[]).length || 12;
  DIMS.forEach(function(d){
    var e = counts[d]/total;          /* fraction of critical skills in this dim, 0..0.5 */
    var pct = 45 + e * 160;           /* 45% baseline, +160 per full weight => varied profiles */
    t[d] = Math.round(Math.max(40, Math.min(99, pct)));
  });
  return t;
}
/* Cohort readiness per dim (avg attribute + avg skill count across members) */
function cohortReadiness(members, dim){
  if (!members || !members.length) return {attrPct:0, skillPct:0, totalPct:0};
  var sumAttr=0, sumSkills=0;
  members.forEach(function(m){
    sumAttr += (m.attrs && m.attrs[dim]) || 0;
    sumSkills += (m.skills || []).filter(function(sid){var sk=null; for(var i=0;i<SKILLS.length;i++){ if(SKILLS[i].id===sid){sk=SKILLS[i];break;} } return sk && sk.dim===dim;}).length;
  });
  var avgAttr = sumAttr/members.length;
  var avgSkills = sumSkills/members.length;
  var attrPct = Math.max(0, Math.min(50, (avgAttr/5)*50));
  var skillPct = Math.max(0, Math.min(50, (avgSkills/6)*50));
  return {attrPct:attrPct, skillPct:skillPct, totalPct:attrPct+skillPct};
}
/* Build a full dimData map from members for radar input */
function cohortDimData(members){
  var out = {};
  DIMS.forEach(function(d){ out[d] = cohortReadiness(members, d); });
  return out;
}

/* Average attrs across a list of COHORT members */
function avgAttrs(members){
  var out = {P:0,I:0,V:0,O:0,T:0};
  if (!members || !members.length) return out;
  DIMS.forEach(function(d){ members.forEach(function(m){ out[d] += m.attrs[d]; }); out[d] = out[d]/members.length; });
  return out;
}

/* ── Seeded star generation (background atmosphere) ── */
function MBA_genStars(count, seed) {
  var stars = [], s = seed;
  for (var i = 0; i < count; i++) {
    s = (s * 9301 + 49297) % 233280; var x = (s / 233280) * MBA_CW;
    s = (s * 9301 + 49297) % 233280; var y = (s / 233280) * MBA_SKY_H;
    s = (s * 9301 + 49297) % 233280; var r = (s / 233280) * 1.5 + 0.3;
    s = (s * 9301 + 49297) % 233280; var op = (s / 233280) * 0.25 + 0.05;
    stars.push({ x: x, y: y, r: r, op: op });
  }
  return stars;
}

              els.push(<circle key={"gd"+di} cx={dx} cy={meterY} r={3.2} fill={dotCol} stroke={strokeCol} strokeWidth={got?0.8:1}/>);
            }
            return els;
          })()}

            var earned=!!earnedState[s.id];
            var inCareer=careerSet?!!careerSet[s.id]:false;
            var dimmed=(careerSet&&!inCareer);
            var isSel=selSkill===s.id;
            var isCrossHL=selExp&&selExpObj&&selExpObj.skills.indexOf(s.id)>=0;
            var r=earned?11:8; if(isSel)r+=2;
            var opacity=dimmed?0.22:1;
            /* latent stars: brighter so they read clearly on the dark sky */
            var fill=rgba(col,earned?0.28:0.14);
            var stroke=rgba(col,earned?0.95:0.75);
            var strokeW=isSel?2.8:(earned?2:1.4);
            var showWhite=careerSet&&inCareer&&!dimmed;
            var lbl=s.label.length>24?s.label.slice(0,22)+"…":s.label;
            /* Labels: show only on earned / selected / cross-highlighted / career-relevant stars.
               Default latent stars are unlabeled to reduce visual noise. */
            var showLabel = earned || isSel || isCrossHL || showWhite;
            var lblFill = earned ? rgba(col,1) : "rgba(255,255,255,0.9)";
            var lblSize = earned ? 12 : 11;
            var lblWeight = earned ? 700 : 500;
            return (
              <g key={s.id} style={{cursor:"pointer",transition:"opacity 0.4s ease"}} opacity={opacity} onClick={function(){toggleSkill(s.id);}}>
                {showWhite&&<circle cx={x} cy={y} r={r+9} fill="#fff" filter="url(#whiteGlow)" opacity={0.32}/>}
                {showWhite&&<circle cx={x} cy={y} r={r+3} fill="none" stroke="#fff" strokeWidth={1.2} opacity={0.55}/>}
                {earned&&!dimmed&&<circle cx={x} cy={y} r={r+7} fill={rgba(col,0.1)}/>}
                {isSel&&<circle cx={x} cy={y} r={r+6} fill="none" stroke={col} strokeWidth={2} opacity={0.65} filter="url(#glow2)"/>}
                <circle cx={x} cy={y} r={r} fill={fill} stroke={stroke} strokeWidth={strokeW}/>
                {earned&&<circle cx={x} cy={y} r={r*0.42} fill="#fff" opacity={0.92}/>}
                {showLabel&&<text x={x} y={y+r+14} textAnchor="middle" fontSize={lblSize} fontWeight={lblWeight} fill={lblFill} fontFamily={FONT} style={{pointerEvents:"none"}}>{lbl}</text>}
              </g>
            );
          })}

          {/* Horizon line */}
          <line x1={0} y1={MBA_SKY_BOT} x2={MBA_CW} y2={MBA_SKY_BOT} stroke="#F5A623" strokeWidth={1} opacity={0.55}/>
          <line x1={0} y1={MBA_SKY_BOT+1.5} x2={MBA_CW} y2={MBA_SKY_BOT+1.5} stroke="#D4710A" strokeWidth={2} opacity={0.35}/>

          {/* Attribute + Skill readiness bars (new stacked model) */}
          <rect x={0} y={MBA_SKY_BOT+3} width={MBA_CW} height={MBA_ATTR_H} fill="#060412" style={{pointerEvents:"none"}}/>
          <text x={16} y={MBA_SKY_BOT+20} fontSize={11} fontWeight={700} fill="rgba(255,255,255,0.75)" fontFamily={FONT} letterSpacing="2">READINESS</text>
          <text x={MBA_CW-16} y={MBA_SKY_BOT+20} textAnchor="end" fontSize={9} fontWeight={500} fill="rgba(255,255,255,0.4)" fontFamily={FONT} letterSpacing="1">ATTRIBUTES + SKILLS</text>
          {ATTRIBUTES.map(function(a,ai){
            var rowY=MBA_SKY_BOT+30+ai*17;
            var col=PC[a.dim];
            var labels={P:"PUR",I:"INT",V:"VIS",O:"OWN",T:"TRA"};
            var barX=48, barW=MBA_CW-80, barH=8;
            var myAttrs2={}; ATTRIBUTES.forEach(function(x){myAttrs2[x.dim]=x.current;});
            var r = computeReadiness(a.dim, earnedState, myAttrs2);
            var attrW = (r.attrPct/100)*barW;
            var totalW = (r.totalPct/100)*barW;
            var tgt = path ? targetForPath(path)[a.dim] : null;
            var tgtX = tgt!==null ? barX+(tgt/100)*barW : null;
            /* Midline: 50% marker showing attribute ceiling */
            var midX = barX + 0.5*barW;
            return (
              <g key={"attr"+ai}>
                <text x={14} y={rowY+8} fontSize={11} fontWeight={700} fill={col} fontFamily={FONT} letterSpacing="0.5">{labels[a.dim]}</text>
                {/* Background track (full bar) */}
                <rect x={barX} y={rowY} width={barW} height={barH} rx={4} ry={4} fill="rgba(255,255,255,0.05)"/>
                {/* 50% attribute-ceiling mark */}
                <line x1={midX} y1={rowY-1} x2={midX} y2={rowY+barH+1} stroke="rgba(255,255,255,0.22)" strokeWidth={1} strokeDasharray="1,2"/>
                {/* Skills portion (lighter) from attr boundary to total */}
                <rect x={barX+attrW} y={rowY} width={Math.max(0,totalW-attrW)} height={barH} rx={0} ry={0} fill={rgba(col,0.45)}/>
                {/* Attribute portion (saturated) — drawn on top */}
                <rect x={barX} y={rowY} width={attrW} height={barH} rx={4} ry={4} fill={rgba(col,0.95)}/>
                {/* Target hash mark (when career selected) */}
                {tgtX!==null && <g>
                  <line x1={tgtX} y1={rowY-4} x2={tgtX} y2={rowY+barH+4} stroke="#FFCC44" strokeWidth={2}/>
                  <text x={tgtX} y={rowY-6} textAnchor="middle" fontSize={8} fontWeight={700} fill="#FFCC44" fontFamily={FONT}>{tgt}</text>
                </g>}
                {/* Combined % on right */}
                <text x={MBA_CW-14} y={rowY+8} textAnchor="end" fontSize={11} fontWeight={700} fill="rgba(255,255,255,0.88)" fontFamily={FONT}>{Math.round(r.totalPct)}%</text>
              </g>
            );
          })}

{/* Detail panel — skill info (with reflection) or experience info */}

              </div>
            )}

                </div>
              ):(
                <div>
                  <textarea value={draft} onChange={function(ev){setDraft(ev.target.value);}} placeholder={earnedState[selSkillObj.id]?"When did you practice this skill? What did you notice about yourself?":"How might you develop this skill in the coming terms?"} style={{width:"100%",minHeight:60,background:rgba(CB,0.04),border:"1px solid "+rgba(PC[selSkillObj.dim],0.3),borderRadius:6,padding:"8px 10px",color:"#fff",fontSize:13,fontFamily:FONT,resize:"vertical",outline:"none"}}/>

                      var prompts = earned ? [
                        "Think about "+sourceName+". What did you notice about yourself in a moment when this skill was tested?",
                        "Describe a specific instance in "+sourceName+" where you did this well — and a moment you didn't. What was the difference?",

                      setDraft(draft?draft+"\n\n"+p:p);
                    }} style={{fontSize:11,padding:"5px 11px",borderRadius:14,background:"rgba(255,204,68,0.12)",border:"1px solid rgba(255,204,68,0.35)",color:"#FFCC44",cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",gap:5}}>✨ Help me reflect</div>

                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        ):selExpObj?(
          <div style={{padding:"14px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,paddingRight:10}}>

              </div>
              <div onClick={function(){setSelExp(null);}} style={{padding:"4px 10px",borderRadius:8,cursor:"pointer",background:rgba(CB,0.08),fontSize:13,color:"rgba(255,255,255,0.5)"}}>✕</div>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{isDone(selExpObj, earnedPreset)?"Developed these skills":"Will develop these skills"}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {selExpObj.skills.map(function(sid){var sk=skillBy(sid);if(!sk)return null;var col=PC[sk.dim];var ear=!!earnedState[sid];return <span key={sid} onClick={function(){toggleSkill(sid);}} style={{fontSize:11,padding:"4px 10px",borderRadius:10,background:rgba(col,ear?0.15:0.05),border:"1px "+(ear?"solid":"dashed")+" "+rgba(col,ear?0.5:0.3),color:ear?"#fff":"rgba(255,255,255,0.7)",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,borderRadius:"50%",background:col,display:"inline-block"}}></span>{sk.label}</span>;})}
            </div>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"14px 0"}}>
            <div style={{fontSize:14,color:ns?rgba(pCol,0.6):(dimFilter?rgba(PC[dimFilter],0.6):"rgba(255,255,255,0.25)")}}>{ns?path.label+" skills illuminated · Tap a star to explore":(dimFilter?DIM_NAMES[dimFilter]+" skills highlighted":"Tap a star to see how you earned it · Tap a tile to see skills it develops")}</div>
          </div>
        )}
      </div>

      <BottomNav active={nav} setActive={setNav} color={CB} onSwitch={props.onSwitch} items={MBA_NAV_ITEMS}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"4px 0 6px",background:rgba(CN,0.9)}}>
        <img src={UNC_LOGO} alt="UNC" style={{width:14,height:14,objectFit:"contain"}}/>
        <span style={{fontSize:9,color:rgba(CB,0.5),letterSpacing:1.5,textTransform:"uppercase"}}>UNC Kenan-Flagler Business School</span>
      </div>

      <PIVOTAssessment open={showAssessment} form={assessmentForm} initial={assessment && assessment.form===assessmentForm ? assessment.responses : {}} onSave={saveAssessment} onClose={function(){setShowAssessment(false);}}/>
    </div>
  );
}

function MBA_TokenBar(props) {
  var CB = "#7BAFD4";
  var dim = props.dim;
  var data = props.data;
  var expanded = props.expanded;
  var onToggle = props.onToggle;
  var attrs = props.attrs || {};
  var earnedMap = props.earnedMap || {};
  var path = props.path || null;
  var earned = data.earned.length;
  var total = data.total;
  var color = PC[dim];
  /* Readiness stack: attributes fill first 50%, skills the next 50% */
  var r = computeReadiness(dim, earnedMap, attrs);
  var target = path ? targetForPath(path)[dim] : null;
  var floor = path && path.floor && path.floor[dim];
  /* Floor as %: attribute-only threshold expressed on the 0..100 readiness scale */
  var floorPct = floor ? (floor/5)*50 : null;

  return (
    <div style={{ marginBottom: 6 }}>
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 12, padding: "14px 16px",
          background: rgba(color, 0.06), borderRadius: expanded ? "14px 14px 0 0" : 14,

          cursor: "pointer", transition: "all 0.2s",
        }}
      >
        <div style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "linear-gradient(135deg," + rgba(color, 0.3) + "," + rgba(color, 0.08) + ")",
          border: "2px solid " + rgba(color, 0.5),
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 15, fontWeight: 700, color: color,
        }}>{dim}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 16, fontWeight: 600, color: "rgba(255,255,255,0.85)" }}>{DIM_NAMES[dim]}</span>
            <span style={{ fontSize: 13, color: "rgba(255,255,255,0.55)" }}>
              <span style={{ fontWeight: 700, color: "#fff" }}>{Math.round(r.totalPct)}%</span>
              <span style={{ margin: "0 6px", color: "rgba(255,255,255,0.2)" }}>·</span>
              <span>{earned}/{total} tokens</span>
            </span>
          </div>
          {/* Readiness bar: background + skill fill + attribute fill + 50% attribute ceiling + floor tick + target tick */}
          <div style={{ position: "relative", height: 10, background: "rgba(255,255,255,0.05)", borderRadius: 5 }}>
            {/* 50% attribute-ceiling mark */}
            <div style={{ position:"absolute", left:"50%", top:-2, bottom:-2, width:1, background:"rgba(255,255,255,0.22)" }}></div>
            {/* Skills portion (lighter) from attribute boundary to total */}
            <div style={{ position:"absolute", left:r.attrPct+"%", top:0, height:"100%", width:Math.max(0,(r.totalPct-r.attrPct))+"%", background: rgba(color,0.45), transition:"width 0.8s ease" }}></div>
            {/* Attribute portion (saturated) */}
            <div style={{ position:"absolute", left:0, top:0, height:"100%", width:r.attrPct+"%", borderRadius: "5px 0 0 5px", background: rgba(color,0.95), transition:"width 0.8s ease" }}></div>
            {/* Attribute-floor tick (minimum threshold for this career) */}
            {floorPct!==null && <div style={{ position:"absolute", left:floorPct+"%", top:-3, bottom:-3, width:2, background:"#FFCC44", opacity:0.9 }} title={"Minimum attribute floor " + floor}></div>}
            {/* Target tick (career ideal) */}
            {target!==null && <div style={{ position:"absolute", left:target+"%", top:-4, bottom:-4, width:2, background:"#50C878" }} title={"Target " + target + "%"}></div>}
          </div>

          {path && (
            <div style={{ display:"flex", gap:10, marginTop:4, fontSize:10, color:"rgba(255,255,255,0.45)" }}>

        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", transform: expanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>▼</div>
      </div>

          borderTop: "none", borderRadius: "0 0 14px 14px", padding: "12px 16px",

      )}
    </div>
  );
}

        <div style={{ height: 10 }} />
      </div>

      {/* ── Bottom Nav ── */}
      <BottomNav active={activeNav} setActive={setActiveNav} color={CB} onSwitch={props.onSwitch} items={MBA_NAV_ITEMS} />

      {/* ── Footer ── */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center", gap: 6,

      <PIVOTAssessment open={showAssessment} form={assessmentForm} initial={assessment && assessment.form===assessmentForm ? assessment.responses : {}} onSave={saveAssessment} onClose={function(){setShowAssessment(false);}}/>
    </div>

}

/* Stdev across a list of numbers (proxy for team diversity on a dim) */
function stdev(arr){ if(arr.length<2) return 0; var m=arr.reduce(function(a,b){return a+b;},0)/arr.length; var v=arr.reduce(function(a,b){return a+(b-m)*(b-m);},0)/arr.length; return Math.sqrt(v); }

              function matchScore(s){
                var dimScore = 0;
                DIMS.forEach(function(d){ dimScore += (s.attrs[d]/5) * (tt.emphasis[d]||0); });
                var skillOverlap = tt.needSkills.filter(function(sk){return s.skills.indexOf(sk)>=0;}).length / tt.needSkills.length;

              var ranked = COHORT.slice().sort(function(a,b){return matchScore(b)-matchScore(a);});

            </div>
          );
        }
        if (block.type === "pivot-cards") {
          return (
            <div key={i} style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>

                  <div key={ci} style={{

                    border: "1px solid " + rgba(PC[card.dim], 0.2),
                    borderRadius: 12, padding: "12px 14px",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{
                        width: 28, height: 28, borderRadius: "50%",
                        background: rgba(PC[card.dim], 0.2),
                        border: "2px solid " + rgba(PC[card.dim], 0.5),
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, fontWeight: 700, color: PC[card.dim],
                      }}>{card.dim}</div>
                      <span style={{ fontSize: 14, fontWeight: 600, color: PC[card.dim] }}>{card.label}</span>
                      <span style={{ marginLeft: "auto", fontSize: 18, fontWeight: 700, color: PC[card.dim] }}>{card.score}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.6 }}>{card.note}</div>
                  </div>
                );
              })}
            </div>
          );
        }
        if (block.type === "story") {
          return (
            <div key={i} style={{
              background: rgba(CB, 0.06),
              border: "1px solid " + rgba(CB, 0.12),
              borderRadius: 12, padding: "14px 16px", marginBottom: 12,
            }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: rgba(CB, 0.8), textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>{block.title}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.75)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{block.content}</div>
            </div>
          );
        }
        if (block.type === "insight") {
          var isFor = block.title.indexOf("For") > -1;
          var borderColor = isFor ? rgba("#50C878", 0.25) : rgba("#FF6B6B", 0.25);
          var bgColor = isFor ? rgba("#50C878", 0.04) : rgba("#FF6B6B", 0.04);
          return (
            <div key={i} style={{
              background: bgColor,
              border: "1px solid " + borderColor,
              borderRadius: 12, padding: "12px 14px", marginBottom: 8,

              <div style={{ fontSize: 13, fontWeight: 700, color: isFor ? "#50C878" : "#FF6B6B", marginBottom: 6 }}>{block.title}</div>

          );
        }
        return null;
      })}
    </div>

}
